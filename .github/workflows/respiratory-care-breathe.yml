name: Respiratory Care BREATHE Release

on:
  pull_request:
    paths:
      - "respiratory-care/**"
      - "scripts/build-respiratory-care-breathe.py"
      - "tests/test_respiratory_care_breathe.py"
      - "tests/test_medical_resident_rounds.py"
      - "post-setup/downloads/manifest.json"
      - "setup-helper/setup-helper-model.mjs"
      - "medical-residents/packages/rounds/ROLE-PACK.json"
      - "index.html"
      - "assets/nurse-ai.css"
      - "sitemap.xml"
      - "README.md"
      - ".github/workflows/respiratory-care-breathe.yml"
  push:
    branches: [main]
    paths:
      - "respiratory-care/**"
      - "scripts/build-respiratory-care-breathe.py"
      - "tests/test_respiratory_care_breathe.py"
      - "tests/test_medical_resident_rounds.py"
      - "post-setup/downloads/manifest.json"
      - "setup-helper/setup-helper-model.mjs"
      - "medical-residents/packages/rounds/ROLE-PACK.json"
      - "index.html"
      - "assets/nurse-ai.css"
      - "sitemap.xml"
      - "README.md"
      - ".github/workflows/respiratory-care-breathe.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rebuild committed BREATHE release bytes
        run: |
          python3 scripts/build-respiratory-care-breathe.py
          git diff --exit-code
      - name: Run BREATHE package and isolation tests
        run: python3 tests/test_respiratory_care_breathe.py
      - name: Run shared adjacent-lane homepage regression
        run: python3 tests/test_medical_resident_rounds.py
      - name: Refuse accidental secrets or PHI examples
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          paths = [p for p in Path("respiratory-care").rglob("*") if p.is_file()]
          text = "\n".join(p.read_text(encoding="utf-8", errors="ignore") for p in paths)
          patterns = {
              "private key": r"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----",
              "generic api key": r"(?i)(?:api[_-]?key|token|password)\s*[:=]\s*['\"][A-Za-z0-9_\-]{16,}",
              "patient or mrn example": r"(?i)(?:patient\s*(?:name)?|mrn\s*(?:number)?)\s*[:=]\s*[A-Za-z0-9][A-Za-z0-9_-]*",
          }
          phi_probe = patterns["patient or mrn example"]
          for sample in ("Patient: John", "MRN: 123456", "MRN number=A1B2C3"):
              if not re.search(phi_probe, sample):
                  raise SystemExit(f"BREATHE PHI scan probe failed: {sample}")
          hits = [name for name, pattern in patterns.items() if re.search(pattern, text)]
          if hits:
              raise SystemExit("BREATHE public-safety scan failed: " + ", ".join(hits))
          print("BREATHE_PUBLIC_SAFETY_SCAN=passed")
          PY
      - name: Verify page links and Python syntax
        run: |
          python3 -m py_compile scripts/build-respiratory-care-breathe.py tests/test_respiratory_care_breathe.py
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          class Links(HTMLParser):
              def __init__(self):
                  super().__init__(); self.links=[]
              def handle_starttag(self, tag, attrs):
                  values=dict(attrs)
                  for key in ("href", "src"):
                      if values.get(key): self.links.append(values[key])
          page=Path("respiratory-care/index.html")
          parser=Links(); parser.feed(page.read_text(encoding="utf-8"))
          for link in parser.links:
              if link.startswith(("http:", "https:", "mailto:", "tel:", "#", "data:")):
                  continue
              target=(page.parent / link.split("#",1)[0].split("?",1)[0]).resolve()
              if link.endswith("/") or target.is_dir(): target=target / "index.html"
              if not target.exists(): raise SystemExit(f"Missing BREATHE page target: {link}")
          print("BREATHE_LINKS=passed")
          PY
