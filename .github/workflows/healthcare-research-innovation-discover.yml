name: Healthcare Research Innovation DISCOVER Release

on:
  pull_request:
    paths:
      - "healthcare-research-innovation-leaders/**"
      - "scripts/build-healthcare-research-innovation-discover.py"
      - "scripts/validate-healthcare-research-innovation-discover-schemas.py"
      - "scripts/scan-public-healthcare-artifacts.py"
      - "tests/test_healthcare_research_innovation_discover.py"
      - "tests/test_medical_resident_rounds.py"
      - "tests/test_respiratory_care_breathe.py"
      - "post-setup/downloads/manifest.json"
      - "setup-helper/setup-helper-model.mjs"
      - "index.html"
      - "assets/nurse-ai.css"
      - "sitemap.xml"
      - ".github/workflows/healthcare-research-innovation-discover.yml"
  push:
    branches: [main]
    paths:
      - "healthcare-research-innovation-leaders/**"
      - "scripts/build-healthcare-research-innovation-discover.py"
      - "scripts/validate-healthcare-research-innovation-discover-schemas.py"
      - "scripts/scan-public-healthcare-artifacts.py"
      - "tests/test_healthcare_research_innovation_discover.py"
      - "tests/test_medical_resident_rounds.py"
      - "tests/test_respiratory_care_breathe.py"
      - "post-setup/downloads/manifest.json"
      - "setup-helper/setup-helper-model.mjs"
      - "index.html"
      - "assets/nurse-ai.css"
      - "sitemap.xml"
      - ".github/workflows/healthcare-research-innovation-discover.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install pinned Draft 2020-12 validator
        run: python3 -m pip install --disable-pip-version-check jsonschema==4.25.1
      - name: Rebuild committed DISCOVER release bytes twice
        run: |
          set -euo pipefail
          python3 scripts/build-healthcare-research-innovation-discover.py
          first="$(sha256sum \
            healthcare-research-innovation-leaders/downloads/DISCOVER-Healthcare-Research-Innovation-Leader-Mission-Control-Hermes-Build-Kit-v1.0.0.zip \
            healthcare-research-innovation-leaders/downloads/discover-healthcare-research-innovation-leader-complete-edition.zip \
            healthcare-research-innovation-leaders/downloads/manifest.json \
            healthcare-research-innovation-leaders/downloads/CHECKSUMS.sha256 | sha256sum | cut -d' ' -f1)"
          python3 scripts/build-healthcare-research-innovation-discover.py
          second="$(sha256sum \
            healthcare-research-innovation-leaders/downloads/DISCOVER-Healthcare-Research-Innovation-Leader-Mission-Control-Hermes-Build-Kit-v1.0.0.zip \
            healthcare-research-innovation-leaders/downloads/discover-healthcare-research-innovation-leader-complete-edition.zip \
            healthcare-research-innovation-leaders/downloads/manifest.json \
            healthcare-research-innovation-leaders/downloads/CHECKSUMS.sha256 | sha256sum | cut -d' ' -f1)"
          test "$first" = "$second"
          git diff --exit-code
          git ls-files --error-unmatch \
            healthcare-research-innovation-leaders/downloads/DISCOVER-Healthcare-Research-Innovation-Leader-Mission-Control-Hermes-Build-Kit-v1.0.0.zip \
            healthcare-research-innovation-leaders/downloads/discover-healthcare-research-innovation-leader-complete-edition.zip \
            healthcare-research-innovation-leaders/downloads/manifest.json \
            healthcare-research-innovation-leaders/downloads/CHECKSUMS.sha256
          test -z "$(git status --porcelain --untracked-files=all)"
      - name: Run DISCOVER package, consent, and isolation tests
        run: python3 tests/test_healthcare_research_innovation_discover.py
      - name: Run full Python regression suite
        run: python3 -m unittest discover -s tests -p 'test_*.py'
      - name: Compile schemas and prove conditional evidence is fail-closed
        run: python3 scripts/validate-healthcare-research-innovation-discover-schemas.py
      - name: Run shared adjacent-lane homepage regressions
        run: |
          python3 tests/test_medical_resident_rounds.py
          python3 tests/test_respiratory_care_breathe.py
      - name: Refuse accidental secrets or PHI examples
        run: python3 scripts/scan-public-healthcare-artifacts.py healthcare-research-innovation-leaders --label DISCOVER
      - name: Verify local HTTP route, manifest, and download
        run: |
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/discover-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for path in \
            / \
            /healthcare-research-innovation-leaders/ \
            /healthcare-research-innovation-leaders/downloads/manifest.json \
            /healthcare-research-innovation-leaders/downloads/DISCOVER-Healthcare-Research-Innovation-Leader-Mission-Control-Hermes-Build-Kit-v1.0.0.zip \
            /healthcare-research-innovation-leaders/downloads/discover-healthcare-research-innovation-leader-complete-edition.zip
          do
            curl --retry 20 --retry-connrefused --retry-delay 1 --fail --silent --show-error \
              --output /tmp/discover-response "http://127.0.0.1:8765$path"
            test -s /tmp/discover-response
          done
      - name: Verify page links and Python syntax
        run: |
          python3 -m py_compile scripts/build-healthcare-research-innovation-discover.py scripts/validate-healthcare-research-innovation-discover-schemas.py tests/test_healthcare_research_innovation_discover.py
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          class Links(HTMLParser):
              def __init__(self):
                  super().__init__(); self.links=[]
              def handle_starttag(self, tag, attrs):
                  values=dict(attrs)
                  for key in ("href", "src"):
                      if values.get(key): self.links.append(values[key])
          page=Path("healthcare-research-innovation-leaders/index.html")
          parser=Links(); parser.feed(page.read_text(encoding="utf-8"))
          for link in parser.links:
              if link.startswith(("http:", "https:", "mailto:", "tel:", "#", "data:")):
                  continue
              target=(page.parent / link.split("#",1)[0].split("?",1)[0]).resolve()
              if link.endswith("/") or target.is_dir(): target=target / "index.html"
              if not target.exists(): raise SystemExit(f"Missing DISCOVER page target: {link}")
          print("DISCOVER_LINKS=passed")
          PY
