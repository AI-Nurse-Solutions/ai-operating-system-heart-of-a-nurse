safety_contract:
  mode: dry-run-default
  idempotent: true
  refuse_if:
  - 'phi_detected_in_import            # regex-based PHI screen of naio-soul.json and naio-projects.json'
  - 'tier_above_yellow_at_onboarding   # onboarding clamps to green|yellow'
  - 'boundaries_not_confirmed          # no_phi + no_clinical_decisions must be true'
  - 'checksum_mismatch                 # any non-manifest file sha256 differs from manifest'
  - 'schema_validation_failed          # naio-soul.json or naio-projects.json fails JSON Schema'
  - 'unsafe_project_path               # project prompt paths must remain under 04-Projects/*.md'
  - 'unsigned_or_tampered_artifact     # future: GPG/Cosign signature'
install_flow:
- id: preflight
  description: Detect OS, bash, python3, core deps, optional Hermes presence.
  blocking: true
- id: verify-checksums
  description: Every non-manifest file's sha256 must match manifest; refuse on mismatch.
  blocking: true
- id: validate-soul-import
  description: naio-soul.json validated against schema; boundaries + tier + PHI checked.
  blocking: true
- id: validate-projects-import
  description: naio-projects.json validated against schema; project tiers/gates/paths + PHI checked.
  blocking: true
- id: plan
  description: Show exactly what would be written/configured. No mutation.
  blocking: false
- id: gate
  description: Human confirmation prompt before apply. Skipped/refused in Phase 2.
  blocking: true
  dry_run_skips: true
- id: apply
  description: 'Future: write SOUL/project files; configure tier ceilings. Idempotent.'
  blocking: false
  dry_run_skips: true
- id: healthcheck
  description: Re-verify bundle state. Never claim success unverified.
  blocking: true
not_yet:
- 'Live Hermes config mutation (Phase 3: EDENA → Hermes config mapping, live human gates)'
- 'Cryptographic signatures (Phase 6: GPG/Cosign; checksums exist now)'
- Cron ritual seeding (Phase 4)
- Tier-tagged skill pack install (Phase 4)
- Network-side model routing enforcement (Phase 3+)
