name: Setup Helper Phase 1

on:
  pull_request:
    paths:
      - "setup-helper/**"
      - "tests/test_setup_helper.py"
      - "tests/test_student_assistant_role_pack.py"
      - "tests/test_staff_nurse_role_pack.py"
      - "tests/test_leader_role_pack.py"
      - "tests/test_educator_role_pack.py"
      - "tests/test_np_role_pack.py"
      - "post-setup/**"
      - "scripts/build-post-setup-role-packs.py"
      - "setup.html"
      - "start-here.html"
      - "privacy.html"
      - "faq.html"
      - "cheat-sheet.html"
      - "hermes-downloads/index.html"
      - "about.html"
      - "hermes-masterclass.html"
      - "sitemap.xml"
      - ".github/workflows/setup-helper.yml"
  push:
    branches: [main]
    paths:
      - "setup-helper/**"
      - "tests/test_setup_helper.py"
      - "tests/test_student_assistant_role_pack.py"
      - "tests/test_staff_nurse_role_pack.py"
      - "tests/test_leader_role_pack.py"
      - "tests/test_educator_role_pack.py"
      - "tests/test_np_role_pack.py"
      - "post-setup/**"
      - "scripts/build-post-setup-role-packs.py"
      - "setup.html"
      - "start-here.html"
      - "privacy.html"
      - "faq.html"
      - "cheat-sheet.html"
      - "hermes-downloads/index.html"
      - "about.html"
      - "hermes-masterclass.html"
      - "sitemap.xml"
      - ".github/workflows/setup-helper.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run deterministic Setup Helper tests
        run: |
          python3 scripts/build-post-setup-role-packs.py
          git diff --exit-code
          python3 tests/test_setup_helper.py
          python3 tests/test_student_assistant_role_pack.py
          python3 tests/test_staff_nurse_role_pack.py
          python3 tests/test_leader_role_pack.py
          python3 tests/test_educator_role_pack.py
          python3 tests/test_np_role_pack.py
      - name: Check generated JavaScript syntax
        run: |
          node --check setup-helper/setup-helper-model.mjs
          node --check setup-helper/setup-helper.mjs
      - name: Refuse accidental secrets or PHI examples
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          paths = list(Path("setup-helper").rglob("*")) + [
              *Path("post-setup").rglob("*"),
              Path("setup.html"), Path("start-here.html"), Path("privacy.html"),
              Path("faq.html"), Path("cheat-sheet.html"), Path("hermes-downloads/index.html"),
              Path("about.html"), Path("hermes-masterclass.html"),
          ]
          text = "\n".join(p.read_text(errors="ignore") for p in paths if p.is_file())
          patterns = {
              "private key": r"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----",
              "generic api key": r"(?i)(?:api[_-]?key|token|password)\s*[:=]\s*['\"][A-Za-z0-9_\-]{16,}",
              "patient example": r"(?i)(?:patient|mrn)\s*(?:name|number)?\s*[:=]\s*[A-Z][a-z]+",
          }
          hits = [name for name, pattern in patterns.items() if re.search(pattern, text)]
          if hits:
              raise SystemExit("Public-safety scan failed: " + ", ".join(hits))
          print("PUBLIC_SAFETY_SCAN=passed")
          PY
