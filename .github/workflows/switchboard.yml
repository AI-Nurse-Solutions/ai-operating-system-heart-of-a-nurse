name: Nurse AI OS Switchboard Preview

on:
  pull_request:
    paths:
      - "assets/nurse-ai.css"
      - "switchboard/**"
      - "tests/test_switchboard.py"
      - "tests/test_switchboard_browser.mjs"
      - "tests/test_switchboard_schema.mjs"
      - "package.json"
      - "package-lock.json"
      - "setup-helper/**"
      - "post-setup/index.html"
      - "post-setup/README.md"
      - "post-setup/build-kits/lead-nurse-leader/**"
      - "post-setup/packages/06-Nurse-Practitioner-USA/**"
      - "post-setup/downloads/**"
      - "scripts/build-lead-nurse-leader-build-kit.py"
      - "scripts/build-post-setup-role-packs.py"
      - "scripts/rotate-wings-country-boundary.py"
      - "scripts/scan-public-healthcare-artifacts.py"
      - "tests/test_leader_role_pack.py"
      - "tests/test_np_role_pack.py"
      - "privacy.html"
      - "README.md"
      - "sitemap.xml"
      - ".github/workflows/switchboard.yml"
  push:
    branches: [main]
    paths:
      - "assets/nurse-ai.css"
      - "switchboard/**"
      - "tests/test_switchboard.py"
      - "tests/test_switchboard_browser.mjs"
      - "tests/test_switchboard_schema.mjs"
      - "package.json"
      - "package-lock.json"
      - "setup-helper/**"
      - "post-setup/index.html"
      - "post-setup/README.md"
      - "post-setup/build-kits/lead-nurse-leader/**"
      - "post-setup/packages/06-Nurse-Practitioner-USA/**"
      - "post-setup/downloads/**"
      - "scripts/build-lead-nurse-leader-build-kit.py"
      - "scripts/build-post-setup-role-packs.py"
      - "scripts/rotate-wings-country-boundary.py"
      - "scripts/scan-public-healthcare-artifacts.py"
      - "tests/test_leader_role_pack.py"
      - "tests/test_np_role_pack.py"
      - "privacy.html"
      - "README.md"
      - "sitemap.xml"
      - ".github/workflows/switchboard.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install pinned test dependencies
        run: npm ci --ignore-scripts
      - name: Run deterministic Switchboard tests
        run: python3 tests/test_switchboard.py
      - name: Check JavaScript syntax
        run: |
          node --check switchboard/switchboard-model.mjs
          node --check switchboard/switchboard.mjs
          node --check setup-helper/setup-helper.mjs
          node --check tests/test_switchboard_browser.mjs
          node --check tests/test_switchboard_schema.mjs
      - name: Validate JSON Schemas and registry entries
        run: npm run test:switchboard-schema
      - name: Run browser interaction and responsive smoke test
        run: npm run test:switchboard-browser
      - name: Confirm exact role-download migrations and pinned build-kit contracts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No parent commit exists; package-diff guard is not applicable."
            exit 0
          fi
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          base = os.environ["BASE_SHA"]
          common_changes = {
              "post-setup/downloads/CHECKSUMS.sha256": "M",
              "post-setup/downloads/manifest.json": "M",
          }
          retired_student_download = "post-setup/downloads/" + "nurse-ai-os-post-setup-" + "student-nurse.zip"
          lane_changes = {
              "future_student_assistant": {
                  retired_student_download: "D",
                  "post-setup/downloads/FUTURE-Nursing-Student-Nursing-Assistant-Mission-Control-Hermes-Build-Kit-v1.0.0.zip": "A",
              },
              "staff_shift": {
                  "post-setup/downloads/nurse-ai-os-post-setup-staff-nurse.zip": "D",
                  "post-setup/downloads/STAFF-Nurse-Life-Practice-SHIFT-Mission-Control-Hermes-Build-Kit-v1.0.0.zip": "A",
              },
              "nurse_leader_lead": {
                  "post-setup/downloads/nurse-ai-os-post-setup-nurse-leader-and-manager.zip": "D",
                  "post-setup/downloads/LEAD-Nurse-Leader-Manager-Mission-Control-Hermes-Build-Kit-v1.0.0.zip": "A",
              },
              "nurse_practitioner_wings": {
                  "post-setup/downloads/nurse-ai-os-post-setup-nurse-practitioner-usa.zip": "D",
                  "post-setup/downloads/WINGS-Nurse-Practitioner-Complete-AI-OS-Mission-Control-Hermes-Build-Kit-v1.0.0.zip": "A",
              },
          }

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()

          subprocess.check_call([
              "git", "diff", "--exit-code", base, "HEAD", "--",
              "post-setup/packages",
              "healthcare-research-innovation-leaders/packages",
              "healthcare-research-innovation-leaders/downloads",
          ])

          changed = set(git("diff", "--name-only", base, "HEAD", "--", "post-setup/downloads").splitlines())
          all_known = set(common_changes)
          for paths in lane_changes.values():
              all_known.update(paths)
          unexpected = changed - all_known
          if unexpected:
              raise SystemExit("Unexpected post-setup/downloads changes: " + ", ".join(sorted(unexpected)))

          if changed:
              active = [name for name, paths in lane_changes.items() if changed & set(paths)]
              if len(active) != 1:
                  raise SystemExit("Expected exactly one governed role-download migration; active=" + json.dumps(active))
              allowed_download_changes = {**common_changes, **lane_changes[active[0]]}
              missing = set(allowed_download_changes) - changed
              if missing:
                  raise SystemExit(f"Incomplete {active[0]} migration: " + ", ".join(sorted(missing)))
              extra = changed - set(allowed_download_changes)
              if extra:
                  raise SystemExit(f"Combined or unexpected {active[0]} migration paths: " + ", ".join(sorted(extra)))

              status = {}
              for line in git("diff", "--name-status", base, "HEAD", "--", *sorted(allowed_download_changes)).splitlines():
                  code, path = line.split("\t", 1)
                  status[path] = code
              wrong_status = {
                  path: status.get(path)
                  for path, expected in allowed_download_changes.items()
                  if status.get(path) != expected
              }
              if wrong_status:
                  raise SystemExit(f"Unexpected {active[0]} migration status: " + json.dumps(wrong_status, sort_keys=True))
              mode = f"migration:{active[0]}"
          else:
              mode = "steady-state"

          manifest = json.loads(open("post-setup/downloads/manifest.json", encoding="utf-8").read())
          future = next(item for item in manifest["packages"] if item["folder"] == "01-Student-Nurse")
          expected_future = {
              "activation": "user_initiated_read_only_preflight_with_exact_implementation_activation_card",
              "build_kit_member_count": 105,
              "build_kit_version": "1.0.0",
              "bytes": 6520918,
              "ci_validation": "tracked_source_builder_and_tracked_verifier_package_and_outer_zip",
              "download": "downloads/FUTURE-Nursing-Student-Nursing-Assistant-Mission-Control-Hermes-Build-Kit-v1.0.0.zip",
              "download_type": "self_install_hermes_build_kit",
              "legacy_source_activation_contract": "user_initiated_guided_complete_setup_with_combined_activation_card",
              "legacy_source_package_version": "2026.07.15.3",
              "package_version": "1.0.0",
              "published_state": "published_not_installed_not_activated_not_operational_not_institutionally_authorized",
              "readiness": "not_operational_build_required",
              "sha256": "b95b413fc25f990f3505fcf7af81c2c483a62da2150f4f77b371ff847b173e76",
              "source_zip_bytes_before_derivative": 6520141,
              "source_zip_sha256_before_derivative": "737968eac95347887eb55f3146c1d964541193e7843ea1f94b5bdc4e171a96c6",
              "target_namespace": "future.*",
              "target_product_id": "future-nursing-student-assistant-mission-control",
              "target_route": "/nursing-students-assistants/dashboard",
              "target_version": "2.0.0",
          }
          for key, value in expected_future.items():
              if future.get(key) != value:
                  raise SystemExit(f"FUTURE manifest mismatch for {key}: {future.get(key)!r}")
          staff = next(item for item in manifest["packages"] if item["folder"] == "02-Staff-Nurse")
          expected = {
              "build_kit_version": "1.0.0",
              "bytes": 6914990,
              "download": "downloads/STAFF-Nurse-Life-Practice-SHIFT-Mission-Control-Hermes-Build-Kit-v1.0.0.zip",
              "download_type": "self_install_hermes_build_kit",
              "published_state": "published_not_installed_not_activated_not_operational_not_institutionally_authorized",
              "readiness": "not_operational_build_required",
              "sha256": "e0ebaff0ad8840ac2e4670a28168a9ac1fdaf17a0c8e3ae72973c8496cb0f709",
          }
          for key, value in expected.items():
              if staff.get(key) != value:
                  raise SystemExit(f"Staff SHIFT manifest mismatch for {key}: {staff.get(key)!r}")
          lead = next(item for item in manifest["packages"] if item["folder"] == "03-Nurse-Leader-and-Manager")
          expected_lead = {
              "build_kit_version": "1.0.0",
              "bytes": 494164,
              "download": "downloads/LEAD-Nurse-Leader-Manager-Mission-Control-Hermes-Build-Kit-v1.0.0.zip",
              "download_type": "self_install_hermes_build_kit",
              "published_state": "published_not_installed_not_activated_not_operational_not_institutionally_authorized",
              "readiness": "not_operational_build_required",
              "sha256": "78293c6eaef4fa277f4afecf14eeb87b90f3385ba71be3189faaca2466c90974",
              "target_route_assignment": "activation_card_required_no_route_preassigned",
          }
          for key, value in expected_lead.items():
              if lead.get(key) != value:
                  raise SystemExit(f"Nurse Leader LEAD manifest mismatch for {key}: {lead.get(key)!r}")

          wings = next(item for item in manifest["packages"] if item["folder"] == "06-Nurse-Practitioner-USA")
          expected_wings = {
              "activation": "user_initiated_read_only_preflight_with_exact_wings_implementation_activation_card",
              "build_kit_member_count": 131,
              "build_kit_version": "1.0.0",
              "bytes": 7696693,
              "country_availability": ["United States"],
              "download": "downloads/WINGS-Nurse-Practitioner-Complete-AI-OS-Mission-Control-Hermes-Build-Kit-v1.0.0.zip",
              "download_type": "self_install_hermes_build_kit",
              "legacy_source_activation_contract": "user_initiated_guided_complete_setup_with_combined_activation_card",
              "package_version": "1.0.0",
              "published_state": "published_not_installed_not_activated_not_operational_not_institutionally_authorized",
              "readiness": "not_operational_build_required",
              "sha256": "ea9a9e631c6bb97ff8f1392d014c6a695dc634e823f9c9a375b95cd7657b5166",
              "source_zip_bytes_before_derivative": 7695951,
              "source_zip_sha256_before_derivative": "7a7ec1b59d1fd31a37aa28b5cc346f78bdb4e516164a91a9c28383fc77b65501",
              "target_namespace": "np_wings.*",
              "target_product_id": "nurse-practitioner-complete-ai-os-mission-control",
              "target_route": "/nurse-practitioners/dashboard",
              "target_version": "2.0.0",
          }
          for key, value in expected_wings.items():
              if wings.get(key) != value:
                  raise SystemExit(f"NP WINGS manifest mismatch for {key}: {wings.get(key)!r}")

          downloads = Path("post-setup/downloads")
          ledger = {}
          for line_number, line in enumerate((downloads / "CHECKSUMS.sha256").read_text(encoding="utf-8").splitlines(), start=1):
              match = re.fullmatch(r"([0-9a-f]{64})  ([^/\\]+\.zip)", line)
              if not match or match.group(2) in ledger:
                  raise SystemExit(f"Invalid or duplicate checksum-ledger line {line_number}")
              ledger[match.group(2)] = match.group(1)
          tracked_archives = {path.name for path in downloads.glob("*.zip")}
          if set(ledger) != tracked_archives:
              raise SystemExit(
                  "Checksum-ledger archive inventory mismatch: "
                  + json.dumps({"missing": sorted(tracked_archives - set(ledger)), "extra": sorted(set(ledger) - tracked_archives)})
              )
          for filename, expected_digest in ledger.items():
              actual_digest = hashlib.sha256((downloads / filename).read_bytes()).hexdigest()
              if actual_digest != expected_digest:
                  raise SystemExit(f"Checksum-ledger digest mismatch: {filename}")
          print(f"ROLE_DOWNLOAD_MIGRATION_GUARD=passed mode={mode}")
          PY
