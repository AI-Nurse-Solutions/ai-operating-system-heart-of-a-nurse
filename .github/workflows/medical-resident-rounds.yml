name: Medical Resident ROUNDS Release

on:
  pull_request:
    paths:
      - "medical-residents/**"
      - "scripts/build-medical-resident-rounds.py"
      - "scripts/scan-public-healthcare-artifacts.py"
      - "tests/test_medical_resident_rounds.py"
      - "post-setup/downloads/manifest.json"
      - "setup-helper/setup-helper-model.mjs"
      - "sitemap.xml"
      - "README.md"
      - ".github/workflows/medical-resident-rounds.yml"
  push:
    branches: [main]
    paths:
      - "medical-residents/**"
      - "scripts/build-medical-resident-rounds.py"
      - "scripts/scan-public-healthcare-artifacts.py"
      - "tests/test_medical_resident_rounds.py"
      - "post-setup/downloads/manifest.json"
      - "setup-helper/setup-helper-model.mjs"
      - "sitemap.xml"
      - "README.md"
      - ".github/workflows/medical-resident-rounds.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rebuild committed ROUNDS release bytes
        run: |
          python3 scripts/build-medical-resident-rounds.py
          git diff --exit-code
          git ls-files --error-unmatch medical-residents/downloads/medical-resident-rounds-complete-edition.zip
          git ls-files --error-unmatch medical-residents/downloads/ROUNDS-Medical-Resident-Complete-AI-OS-Mission-Control-Hermes-Build-Kit-v1.0.0.zip
          git ls-files --error-unmatch medical-residents/build-kit/ROUNDS-Medical-Resident-Complete-AI-OS-Mission-Control-Hermes-Build-Kit-v1.0.0/tools/verify-build-kit.py
          git ls-files --error-unmatch medical-residents/downloads/manifest.json
          git ls-files --error-unmatch medical-residents/downloads/CHECKSUMS.sha256
          test -z "$(git status --porcelain --untracked-files=all)"
      - name: Run ROUNDS package and isolation tests
        run: python3 tests/test_medical_resident_rounds.py
      - name: Refuse accidental secrets or PHI examples
        run: python3 scripts/scan-public-healthcare-artifacts.py medical-residents --label ROUNDS
      - name: Verify page links and Python syntax
        run: |
          python3 -m py_compile scripts/build-medical-resident-rounds.py tests/test_medical_resident_rounds.py scripts/scan-public-healthcare-artifacts.py
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          class Links(HTMLParser):
              def __init__(self):
                  super().__init__(); self.links=[]
              def handle_starttag(self, tag, attrs):
                  values=dict(attrs)
                  for key in ("href", "src"):
                      if values.get(key): self.links.append(values[key])
          page=Path("medical-residents/index.html")
          parser=Links(); parser.feed(page.read_text())
          for link in parser.links:
              if link.startswith(("http:", "https:", "mailto:", "tel:", "#", "data:")):
                  continue
              target=(page.parent / link.split("#",1)[0].split("?",1)[0]).resolve()
              if link.endswith("/") or target.is_dir(): target=target / "index.html"
              if not target.exists(): raise SystemExit(f"Missing ROUNDS page target: {link}")
          print("ROUNDS_LINKS=passed")
          PY
