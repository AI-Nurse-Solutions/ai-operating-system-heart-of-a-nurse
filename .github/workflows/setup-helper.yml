name: Setup Helper Phase 1

on:
  pull_request:
    paths:
      - "setup-helper/**"
      - "tests/test_setup_helper.py"
      - "tests/test_student_assistant_role_pack.py"
      - "tests/test_staff_nurse_role_pack.py"
      - "tests/test_leader_role_pack.py"
      - "tests/test_educator_role_pack.py"
      - "tests/test_np_role_pack.py"
      - "post-setup/**"
      - "scripts/build-lead-nurse-leader-build-kit.py"
      - "scripts/build-post-setup-role-packs.py"
      - "scripts/scan-public-healthcare-artifacts.py"
      - "setup.html"
      - "start-here.html"
      - "privacy.html"
      - "faq.html"
      - "cheat-sheet.html"
      - "hermes-downloads/index.html"
      - "about.html"
      - "hermes-masterclass.html"
      - "sitemap.xml"
      - ".github/workflows/setup-helper.yml"
  push:
    branches: [main]
    paths:
      - "setup-helper/**"
      - "tests/test_setup_helper.py"
      - "tests/test_student_assistant_role_pack.py"
      - "tests/test_staff_nurse_role_pack.py"
      - "tests/test_leader_role_pack.py"
      - "tests/test_educator_role_pack.py"
      - "tests/test_np_role_pack.py"
      - "post-setup/**"
      - "scripts/build-lead-nurse-leader-build-kit.py"
      - "scripts/build-post-setup-role-packs.py"
      - "scripts/scan-public-healthcare-artifacts.py"
      - "setup.html"
      - "start-here.html"
      - "privacy.html"
      - "faq.html"
      - "cheat-sheet.html"
      - "hermes-downloads/index.html"
      - "about.html"
      - "hermes-masterclass.html"
      - "sitemap.xml"
      - ".github/workflows/setup-helper.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run deterministic Setup Helper tests
        run: |
          python3 scripts/build-post-setup-role-packs.py
          git diff --exit-code
          python3 tests/test_setup_helper.py
          python3 tests/test_student_assistant_role_pack.py
          python3 tests/test_staff_nurse_role_pack.py
          python3 tests/test_leader_role_pack.py
          python3 tests/test_educator_role_pack.py
          python3 tests/test_np_role_pack.py
      - name: Check generated JavaScript syntax
        run: |
          node --check setup-helper/setup-helper-model.mjs
          node --check setup-helper/setup-helper.mjs
      - name: Refuse accidental secrets or PHI examples
        run: |
          python3 scripts/scan-public-healthcare-artifacts.py setup-helper --label SETUP_HELPER
          python3 scripts/scan-public-healthcare-artifacts.py post-setup --label POST_SETUP
          for page in setup.html start-here.html privacy.html faq.html cheat-sheet.html \
            hermes-downloads/index.html about.html hermes-masterclass.html; do
            python3 scripts/scan-public-healthcare-artifacts.py "$page" --label SETUP_PAGE
          done
