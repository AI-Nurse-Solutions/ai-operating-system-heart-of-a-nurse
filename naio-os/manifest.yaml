  import_soul: scripts/import-soul.py
  import_projects: scripts/import-projects.py
  render_profile: scripts/render-profile.py
  healthcheck: scripts/healthcheck.py
checksum_policy:
  algorithm: sha256
  manifest_self_hash: excluded
  note: manifest.yaml is intentionally not self-hashed; all other listed artifacts require sha256. Run scripts/compute-checksums.sh before shipping.
