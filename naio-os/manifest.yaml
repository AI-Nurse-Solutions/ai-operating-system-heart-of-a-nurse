  render_profile: scripts/render-profile.py
  healthcheck: scripts/healthcheck.py
  verify_release: scripts/verify-release.py
  release_channel: release.json
checksum_policy:
  algorithm: sha256
  manifest_self_hash: excluded
  note: manifest.yaml is intentionally not self-hashed; release.json, manifest.sha256, and manifest.sig are update-channel artifacts outside the manifest self-hash loop. Run scripts/compute-checksums.sh, then regenerate manifest.sha256, manifest.sig, and release.json before shipping.
