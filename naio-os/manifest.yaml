safety_contract:
  mode: dry-run-default_apply-target-only_templates-only-cron_remote-bootstrap-self-test_signed-update-channel_rollback-protected_update-advisory_recovery-drill_activation-ready_public-launch-ready_outcomes-ledger_commercial-activation
  idempotent: true
  mutation_scope: explicit_target_directory_only
  bootstrap_scope: temporary_download_directory_only
  never_mutates:
  - ~/.hermes
  - user home directory
  - Hermes cron database
  refuse_if:
  - 'phi_detected_in_import            # regex-based PHI screen of naio-soul.json and naio-projects.json'
  - 'tier_above_yellow_at_onboarding   # onboarding clamps to green|yellow'
  - 'boundaries_not_confirmed          # no_phi + no_clinical_decisions must be true'
  - 'checksum_mismatch                 # any non-manifest file sha256 differs from manifest'
  - 'schema_validation_failed          # naio-soul.json or naio-projects.json fails JSON Schema'
  - 'unsafe_project_path               # project prompt paths must remain under generated projects/*.SYSTEM.md'
  - 'apply_without_target              # apply requires explicit --target'
  - 'target_is_home_or_hermes_home     # never overwrite home or ~/.hermes directly'
  - 'release_signature_mismatch        # manifest.sig must verify against the public release key'
  - 'release_digest_mismatch           # manifest.sha256 and release.json must match manifest.yaml'
  - 'stale_update_channel              # release.json latest_version must equal manifest version'
  - 'release_history_rollback          # local/latest phase rank must not move backward'
  - 'untrusted_release_key_id          # release.json key_id must be listed in release-history.json'
  - 'recovery_phi_detected          # recovery snapshots refuse PHI-like indicators'
  - 'unsafe_recovery_archive       # restore snapshots must not contain absolute/path-traversal/link/device entries'
  - 'automatic_restore_requested   # Phase 8 generates restore plans; humans copy intentionally'
  - 'activation_missing_start_here   # Phase 9 requires START-HERE.md first-run guide'
  - 'activation_missing_first_week    # Phase 9 requires 7-day activation path'
  - 'activation_phi_detected          # activation check refuses PHI-like indicators'
  - 'launch_missing_public_pack    # Phase 10 requires 10-Public-Launch assets'
  - 'launch_phi_detected          # launch check refuses PHI-like indicators'
  - 'launch_overclaim_detected    # launch check refuses clinical-readiness overclaims'
  - 'partner_phi_detected          # Phase 19 requires no-PHI partner briefing materials'
  - 'partner_overclaim_detected    # Phase 19 refuses funding/approval/procurement/clinical-deployment overclaims'
  - 'automatic_partner_outreach    # Phase 19 drafts only; no automatic outreach or follow-up'
  - 'stewardship_phi_detected          # Phase 20 requires no-PHI institutional stewardship materials'
  - 'stewardship_authority_overclaim   # Phase 20 refuses legal/compliance/procurement/staffing/clinical-deployment authority claims'
  - 'automatic_stewardship_action      # Phase 20 drafts only; no automatic implementation, owner assignment, notification, escalation, or dashboard publication'
  - 'localization_phi_detected          # Phase 21 requires no-PHI localization readiness materials'
  - 'localization_authority_overclaim   # Phase 21 refuses legal/regulatory/compliance/translation/licensure/clinical/local approval claims'
  - 'automatic_localization_action      # Phase 21 drafts only; no automatic translation, publishing, outreach, steward assignment, regional data collection, or authority submission'
  - 'outcomes_phi_detected          # Phase 22 requires no-PHI adoption/outcomes ledger materials'
  - 'outcomes_impact_overclaim      # Phase 22 refuses clinical efficacy/patient outcome/ROI/staffing/compliance/certification claims'
  - 'automatic_outcomes_action      # Phase 22 drafts only; no automatic scoring, dashboard publication, reporting, manager notification, escalation, badge, or credential issuance'
  - 'commercial_phi_detected          # Phase 23 requires no-PHI commercial activation materials'
  - 'commercial_authority_overclaim   # Phase 23 refuses certification, procurement, clinical deployment, legal/compliance, sponsorship, or funding authority claims'
  - 'automatic_commercial_action      # Phase 23 drafts only; no automatic enrollment, payment, invoicing, outreach, follow-up, reporting, or funding acceptance'
install_flow:
- id: bootstrap-download
  description: Optional one-line installer downloads manifest and listed artifacts into a temporary directory.
  blocking: true
- id: verify-release-signature
  description: Verify release.json, manifest.sha256, and manifest.sig before trusting manifest checksums.
  blocking: true
- id: check-update-advisory
  description: Optional --check-update verifies local release history and compares the advisory channel without mutating anything.
  blocking: false
  dry_run_skips: false
- id: preflight
  description: Detect OS, bash, python3, core deps, optional Hermes presence.
  blocking: true
- id: verify-checksums
  description: Every non-manifest file's sha256 must match manifest; refuse on mismatch.
  blocking: true
- id: self-test
  description: Phase 8 smoke test creates safe imports, verifies signed release metadata, dry-runs, applies to temp target, validates outputs, runs recovery drill, and verifies refusal cases.
  blocking: true
  optional: true
- id: validate-soul-import
  description: naio-soul.json validated against schema; boundaries + tier + PHI checked.
  blocking: true
- id: validate-projects-import
  description: naio-projects.json validated against schema; project tiers/gates/paths + PHI checked.
  blocking: true
- id: recovery-drill
  description: Optional --recovery-drill snapshots a rendered target, verifies checksum sidecar, extracts to temp, compares inventory, and writes a human restore plan without mutating Hermes.
  blocking: false
  dry_run_skips: false
- id: activation-check
  description: Optional --activation-check verifies START-HERE.md, first-week path, EDENA runtime, no-PHI posture, and cron templates-only state without mutating Hermes.
  blocking: false
  dry_run_skips: false
- id: outcomes-check
  description: Optional --outcomes-check verifies no-PHI adoption signals and learning evidence without clinical, financial, staffing, compliance, certification, performance-evaluation, or automatic reporting claims.
  blocking: false
  dry_run_skips: false
- id: commercial-check
  description: Optional --commercial-check verifies no-PHI founding cohort and pilot conversation activation without certification, procurement/deployment approval, payment automation, or automatic outreach/reporting claims.
  blocking: false
  dry_run_skips: false
- id: plan
  description: Show exactly what dry-run or apply will do.
  blocking: false
- id: render-profile-and-execution-plane
  description: Apply writes governed profile, tier-tagged skills, and cron ritual templates to --target only.
  blocking: true
  dry_run_skips: true
- id: healthcheck
  description: Re-verify bundle state. Never claim success unverified.
  blocking: true
- id: launch-check
  description: Optional --launch-check verifies no-PHI public launch pack readiness, no clinical-readiness claims, and human-review posture without mutating Hermes.
  blocking: false
  dry_run_skips: false
not_yet:
- Direct ~/.hermes mutation (deferred until explicit user-controlled installer hardening)
- Automatic Hermes cron scheduling (templates only)
- Network-side model routing enforcement (Phase 6+)
- Automatic update/apply from remote channel (advisory only)
- Multiple active signing keys / key rotation ceremonies (metadata-ready, not operationalized)
- Automatic restore into ~/.hermes (Phase 8 only generates local snapshots and human restore plans)
- Cloud backup/sync of recovery snapshots (local-only by default)
- Cohort/instructor evidence trail (Phase 10+)
signature_policy:
  algorithm: RSA-SHA256 detached signature
  public_key: config/naio-os-release-public.pem
  signed_artifact: manifest.yaml
  signature: manifest.sig
  digest: manifest.sha256
  release_channel: release.json
  fail_closed: true
  note: Bootstrap, install, and check-update verify release metadata before trusting artifact checksums. Phase 10 adds public launch pack readiness.
  key_id: naio-os-release-key-2026-06
  release_history: release-history.json
